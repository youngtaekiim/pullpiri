# Test 2: NVIDIA SMI test
# Uses NVIDIA CUDA runtime image with nvidia-smi
apiVersion: v1
kind: Scenario
metadata:
  name: helloworld
spec:
  condition: null
  action: launch
  target: helloworld
---
apiVersion: v1
kind: Package
metadata:
  label: null
  name: helloworld
spec:
  pattern:
    - type: plain
  models:
    - name: gpu-test-nvidia-smi
      node: HPC
      resources:
        volume:
        network:
---
apiVersion: v1
kind: Model
metadata:
  name: gpu-test-nvidia-smi
  labels:
    app: gpu-test
    test-level: nvidia-smi
spec:
  containers:
  - name: gpu-test
    image: nvcr.io/nvidia/cuda:13.3.0-runtime-ubuntu24.04
    command: ["/bin/bash"]
    args: ["/test-nvidia-smi.sh"]
    resources:
      limits:
        nvidia.com/gpu: "1"
    volumeMounts:
    - name: test-script
      mountPath: /test-nvidia-smi.sh
      subPath: test-nvidia-smi.sh
    - name: nvidia-smi
      mountPath: /usr/bin/nvidia-smi
      readOnly: true
    - name: nvidia-libs
      mountPath: /usr/lib/x86_64-linux-gnu/nvidia
      readOnly: true
    env:
    - name: LD_LIBRARY_PATH
      value: "/usr/lib/x86_64-linux-gnu/nvidia:/usr/local/nvidia/lib:/usr/local/nvidia/lib64"
  volumes:
  - name: test-script
    hostPath:
      path: /root/work/pullpiri/examples/resources/gpu/test-nvidia-smi.sh
      type: File
  - name: nvidia-smi
    hostPath:
      path: /usr/bin/nvidia-smi
      type: File
  - name: nvidia-libs
    hostPath:
      path: /usr/lib/x86_64-linux-gnu
      type: Directory
  restartPolicy: Never
