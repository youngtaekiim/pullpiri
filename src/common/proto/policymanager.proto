syntax = "proto3";

package policymanager;

service PolicyManagerConnection {
  // Check if a node is allowed for deployment based on policy
  rpc CheckNodePolicy(CheckNodePolicyRequest) returns (CheckNodePolicyResponse);
}

// Request to check if deployment to a specific node is allowed
message CheckNodePolicyRequest {
  string policy_name = 1;      // Name of the policy to check (e.g., "policy_helloworld")
  string target_node = 2;      // Node where deployment is requested (e.g., "HPC")
}

// Response for node policy check
message CheckNodePolicyResponse {
  bool allowed = 1;            // Whether deployment to target_node is allowed
  string fallback_node = 2;    // Suggested fallback node if not allowed (from policy)
  string message = 3;          // Additional information or error message
}
