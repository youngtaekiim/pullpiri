syntax = "proto3";

package actioncontroller;

service ActionControllerConnection {
  rpc TriggerAction(TriggerActionRequest) returns (TriggerActionResponse);
  rpc Reconcile(ReconcileRequest) returns (ReconcileResponse);
  rpc CompleteNetworkSetting(CompleteNetworkSettingRequest) returns (CompleteNetworkSettingResponse);
  
  // Offload a model from one node to another (terminate + launch)
  rpc OffloadModel(OffloadModelRequest) returns (OffloadModelResponse);
}

message TriggerActionRequest {
  string scenario_name = 1;
}

message TriggerActionResponse {
  int32 status = 1;
  string desc = 2;
}

message ReconcileRequest {
  string scenario_name = 1;
  PodStatus current = 2;
  PodStatus desired = 3;
}

message ReconcileResponse {
  int32 status = 1;
  string desc = 2;
}

message CompleteNetworkSettingRequest {
  string request_id = 1;
  NetworkStatus network_status = 2;
  PodStatus pod_status = 3;
  string details = 4;
}
message CompleteNetworkSettingResponse {
  bool acknowledged = 1;
}

// Request to offload (migrate) a model from source node to target node
message OffloadModelRequest {
  string scenario_name = 1;        // Scenario containing the package
  string package_name = 2;         // Package containing the model
  string model_name = 3;           // Model (container) to offload
  string source_node = 4;          // Current node where container is running
  string target_node = 5;          // Target node to migrate to
  string policy_name = 6;          // Policy that triggered offloading
  string reason = 7;               // Reason for offloading
}

message OffloadModelResponse {
  bool success = 1;                // Whether offloading was successful
  string message = 2;              // Additional information or error message
  string transition_id = 3;        // ID for tracking the offloading operation
}
 
enum NetworkStatus {
  OK = 0;
  ERROR = 1;
  TIMEOUT = 2;
}

enum PodStatus {
  NONE = 0;
  INIT = 1;
  READY = 2;
  RUNNING = 3;
  DONE = 4;
  FAILED = 5;
  UNKNOWN = 6;
}