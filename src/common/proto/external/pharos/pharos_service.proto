syntax = "proto3";
package pharos.api.v1;

service PharosNetworkServiceConnection {
  rpc RequestNetworkPod(RequestNetworkPodRequest) returns (RequestNetworkPodResponse);
}

message RequestNetworkPodRequest {
  string node_yaml = 1;
  string pod_name = 2;
  string networkYamls = 3;
}
message RequestNetworkPodResponse {
  string request_id = 1;
  bool accepted = 2;
  string message = 3;
}

// Network Manager service for Resource Manager
service PharosNetworkManager {
  rpc SetupNetwork(NetworkSetupRequest) returns (NetworkSetupResponse);
  rpc RemoveNetwork(NetworkRemoveRequest) returns (NetworkRemoveResponse);
}

message NetworkSetupRequest {
  string network_name = 1;
  string network_mode = 2;  // bridge, host, overlay, macvlan, etc.
}

message NetworkSetupResponse {
  bool success = 1;
  string message = 2;
}

message NetworkRemoveRequest {
  string network_name = 1;
}

message NetworkRemoveResponse {
  bool success = 1;
  string message = 2;
}
